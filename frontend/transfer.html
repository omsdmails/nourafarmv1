<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحويل الأموال - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: #2e4a2e; border-radius: 40px; padding: 30px; color: white; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 30px; border: none; font-size: 16px; }
        button { background: #ffcf4a; font-weight: bold; cursor: pointer; }
        .nav-btn { background: #3b5e2b; color: white; text-decoration: none; display: inline-block; margin-top: 15px; padding: 8px 20px; border-radius: 30px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 20px; }
        .success { background: #2a6b2a; color: #c0ffc0; }
        .error { background: #8b3a3a; color: #ffc0c0; }
        .gold-display { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>💰 تحويل الأموال</h1>
        <p>يمكنك إرسال دينار إلى لاعب آخر</p>
        <div class="gold-display" id="balance">💰 0 فلس</div>
        <input type="text" id="recipient" placeholder="اسم المستلم">
        <input type="number" id="amount" placeholder="المبلغ بالدينار (مثال: 0.500)" step="0.001" min="0.001">
        <button id="transferBtn">📤 إرسال المال</button>
        <div id="msg"></div>
        <a href="dashboard.html" class="nav-btn">🏠 العودة للرئيسية</a>
    </div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        function formatMoney(fils) {
            if (fils < 10) return fils + ' فلس';
            if (fils < 1000) return (fils / 10) + ' قرش';
            let dinars = fils / 1000;
            let remainder = fils % 1000;
            if (remainder === 0) return dinars + ' دينار';
            return dinars + ' دينار و ' + (remainder / 10) + ' قرش';
        }
        function parseDinarToFils(dinarStr) { let dinars=parseFloat(dinarStr); if(isNaN(dinars)) return null; return Math.floor(dinars*1000); }
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        let playerGold = 0;
        async function loadGold() { try { const data = await fetchWithAuth('/api/user/data'); playerGold = data.gold; document.getElementById('balance').innerHTML = `💰 ${formatMoney(playerGold)}`; } catch(e) {} }
        async function transfer() {
            const recipient = document.getElementById('recipient').value.trim();
            const amountDinar = document.getElementById('amount').value;
            if (!recipient) { showMessage('⚠️ أدخل اسم المستلم', true); return; }
            const amountFils = parseDinarToFils(amountDinar);
            if (!amountFils || amountFils <= 0) { showMessage('⚠️ أدخل مبلغاً صحيحاً', true); return; }
            try {
                const data = await fetchWithAuth('/api/transfer', { method: 'POST', body: JSON.stringify({ toUsername: recipient, amountFils }) });
                if (data.error) showMessage(data.error, true);
                else { showMessage(`✅ تم إرسال ${formatMoney(amountFils)} إلى ${recipient}`); loadGold(); document.getElementById('amount').value = ''; }
            } catch(e) { showMessage(e.message, true); }
        }
        function showMessage(msg, isError) { const msgDiv = document.getElementById('msg'); msgDiv.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${msg}</div>`; setTimeout(() => msgDiv.innerHTML = '', 3000); }
        loadGold();
        document.getElementById('transferBtn').onclick = transfer;
    </script>
</body>
</html>
