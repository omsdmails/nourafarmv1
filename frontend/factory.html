<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المصنع - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .factory-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .machine-card { background: #2c5e2a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .progress-bar { background: #4f7840; height: 6px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        function formatMoney(fils) {
            if (fils < 10) return fils + ' فلس';
            if (fils < 1000) return (fils / 10) + ' قرش';
            let dinars = fils / 1000;
            let remainder = fils % 1000;
            if (remainder === 0) return dinars + ' دينار';
            return dinars + ' دينار و ' + (remainder / 10) + ' قرش';
        }
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        const MACHINES = {
            'mill': { name:'مطحنة حبوب', emoji:'🏭', input:'Wheat', output:'Flour', time:8, cost:50000, profit:5000 },
            'bakery': { name:'مخبز', emoji:'🍞', input:'Flour', output:'Bread', time:6, cost:40000, profit:4000 }
        };
        let player = { gold: 0, inventory: {}, game_data: {} };
        let machines = [];
        async function loadData() { try { const data = await fetchWithAuth('/api/user/data'); player.gold = data.gold; player.inventory = data.inventory || {}; player.game_data = data.game_data || {}; machines = player.game_data.machines || []; renderFactory(); } catch(e) {} }
        async function buyMachine(machineId) { const machine = MACHINES[machineId]; try { const data = await fetchWithAuth('/api/factory/buy-machine', { method: 'POST', body: JSON.stringify({ machineType: machineId, cost: machine.cost }) }); if(data.error) showMessage(data.error, true); else { showMessage(`✅ اشتريت ${machine.emoji} ${machine.name}`); loadData(); } } catch(e) { showMessage(e.message, true); } }
        async function startProduction(machineIndex) { const machine = machines[machineIndex]; const def = MACHINES[machine.type]; try { const data = await fetchWithAuth('/api/factory/start-production', { method: 'POST', body: JSON.stringify({ machineIndex, inputItem: def.input }) }); if(data.error) showMessage(data.error, true); else { showMessage(`⚙️ بدأ إنتاج ${def.output}`); loadData(); } } catch(e) { showMessage(e.message, true); } }
        function showMessage(msg, isError) { const msgDiv = document.getElementById('message'); msgDiv.innerHTML = msg; msgDiv.className = isError ? 'message error-message' : 'message'; msgDiv.style.display = 'block'; setTimeout(() => { msgDiv.style.display = 'none'; }, 3000); }
        function renderFactory() {
            let machinesHtml = '';
            for (let i=0; i<machines.length; i++) {
                const m = machines[i];
                const def = MACHINES[m.type];
                let statusHtml = m.status === 'busy' ? `<div>⏳ جاري الإنتاج</div>` : `<div>✅ جاهز للإنتاج</div><button onclick="window.startProduction(${i})">▶️ ابدأ الإنتاج (يتطلب ${def.input})</button>`;
                machinesHtml += `<div class="machine-card"><div><strong>${def.emoji} ${def.name}</strong><br>المدخل: ${def.input} → المنتج: ${def.output}<br>الربح: ${formatMoney(def.profit)} | الوقت: ${def.time} ثانية</div><div>${statusHtml}</div></div>`;
            }
            if (machines.length === 0) machinesHtml = '<p>لا تملك آلات بعد. اشترِ آلة للبدء.</p>';
            let buyBtns = ''; for (let [id,m] of Object.entries(MACHINES)) buyBtns += `<button onclick="window.buyMachine('${id}')">${m.emoji} شراء ${m.name} (${formatMoney(m.cost)})</button>`;
            let invHtml = '<div style="background:#1f3b1a; border-radius:20px; padding:12px; margin-top:15px;"><h3>📦 مخزونك الحالي</h3>';
            for (let [item, qty] of Object.entries(player.inventory)) if (qty > 0) invHtml += `<span style="background:#3b5e2b; padding:5px 12px; display:inline-block; margin:4px;">${item}: ${qty}</span>`;
            invHtml += '</div>';
            document.getElementById('app').innerHTML = `<div class="container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${localStorage.getItem('username')}</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🏭 المصنع</h2><div class="factory-card"><h3>⚙️ آلاتي</h3>${machinesHtml}<hr><h3>➕ شراء آلات جديدة</h3>${buyBtns}</div>${invHtml}<div id="message" class="message"></div></div></div>`;
            document.getElementById('dashboardBtn').onclick = () => { window.location.href = 'dashboard.html'; };
        }
        loadData();
        window.buyMachine = buyMachine; window.startProduction = startProduction;
    </script>
</body>
</html>
