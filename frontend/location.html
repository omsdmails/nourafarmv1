<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحديد الموقع - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: #2e4a2e; border-radius: 40px; padding: 30px; text-align: center; color: white; }
        button { background: #ffcf4a; border: none; padding: 12px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 10px; }
        .location-info { background: #1f3b1a; border-radius: 20px; padding: 15px; margin: 15px 0; }
        .nav-btn { background: #3b5e2b; color: white; text-decoration: none; display: inline-block; margin-top: 10px; padding: 8px 20px; border-radius: 30px; }
        .error { color: #ffaaaa; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>📍 تحديد موقعك الجغرافي</h1>
        <p>سيتم استخدام موقعك لتوزيع طلبات النقل بشكل عادل.</p>
        <div class="location-info" id="locationInfo">لم يتم تحديد موقع بعد.</div>
        <button id="getLocationBtn">📍 تحديث موقعي الحالي</button>
        <button id="useMockBtn">🗺️ استخدام موقع افتراضي (عمان)</button>
        <div><a href="dashboard.html" class="nav-btn">🏠 العودة للرئيسية</a></div>
        <div id="msg"></div>
    </div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        async function saveLocation(lat, lon) {
            try {
                await fetchWithAuth('/api/location/save', { method: 'POST', body: JSON.stringify({ lat, lon }) });
                document.getElementById('locationInfo').innerHTML = `<p>📍 خط العرض: ${lat.toFixed(4)}</p><p>📍 خط الطول: ${lon.toFixed(4)}</p><p>🕒 آخر تحديث: ${new Date().toLocaleString()}</p>`;
                showMessage('✅ تم حفظ موقعك');
            } catch(e) { showMessage(e.message, true); }
        }
        function getCurrentLocation() { if(!navigator.geolocation){ showMessage('المتصفح لا يدعم تحديد الموقع',true); return; }
            navigator.geolocation.getCurrentPosition(pos=>saveLocation(pos.coords.latitude,pos.coords.longitude), err=>{ showMessage('تعذر الحصول على الموقع',true); }); }
        function useMockLocation() { saveLocation(31.9474, 35.9332); }
        function showMessage(msg, isError) { const msgDiv=document.getElementById('msg'); msgDiv.innerHTML=`<div class="${isError?'error':''}" style="margin-top:15px;">${msg}</div>`; setTimeout(()=>msgDiv.innerHTML='',3000); }
        document.getElementById('getLocationBtn').onclick = getCurrentLocation;
        document.getElementById('useMockBtn').onclick = useMockLocation;
    </script>
</body>
</html>
