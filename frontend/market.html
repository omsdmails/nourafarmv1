<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>السوق المشترك - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .market-container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { background: #1f3b1a; padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; font-size: 18px; border-right: 4px solid #ffcf4a; }
        .listing-card { background: #1f3b1a; border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .listing-card button { background: #ffcf4a; border: none; padding: 6px 15px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .create-listing { background: #1f3b1a; border-radius: 20px; padding: 20px; margin-top: 20px; }
        input, select { padding: 10px; border-radius: 25px; border: none; margin: 5px; width: calc(33% - 10px); }
        button { background: #ffcf4a; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
        .empty-market { text-align: center; padding: 20px; color: #c5e0b4; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        function formatMoney(fils) {
            if (fils < 10) return fils + ' فلس';
            if (fils < 1000) return (fils / 10) + ' قرش';
            let dinars = fils / 1000;
            let remainder = fils % 1000;
            if (remainder === 0) return dinars + ' دينار';
            return dinars + ' دينار و ' + (remainder / 10) + ' قرش';
        }
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        let player = { gold: 0, inventory: {} };
        async function loadPlayer() {
            try {
                const data = await fetchWithAuth('/api/user/data');
                player.gold = data.gold;
                player.inventory = data.inventory;
                renderMarket();
            } catch(e) {}
        }
        async function createListing(item, qty, price) {
            try {
                const data = await fetchWithAuth('/api/market/create', { method: 'POST', body: JSON.stringify({ item, quantity: qty, pricePerUnit: price }) });
                if (data.error) showMessage(data.error, true);
                else { showMessage(`✅ تم نشر ${qty} ${item} للبيع`); loadPlayer(); }
            } catch(e) { showMessage(e.message, true); }
        }
        async function buyListing(listingId, pricePerUnit, qty, itemName, sellerId) {
            try {
                const data = await fetchWithAuth('/api/market/buy', { method: 'POST', body: JSON.stringify({ listingId, quantity: qty, pricePerUnit, itemName, sellerId }) });
                if (data.error) showMessage(data.error, true);
                else { showMessage(`🛒 اشتريت ${qty} ${itemName}`); loadPlayer(); }
            } catch(e) { showMessage(e.message, true); }
        }
        function showMessage(msg, isError) { const msgDiv = document.getElementById('message'); msgDiv.innerHTML = msg; msgDiv.className = isError ? 'message error-message' : 'message'; msgDiv.style.display = 'block'; setTimeout(() => { msgDiv.style.display = 'none'; }, 3000); }
        async function renderMarket() {
            const res = await fetch(API_BASE + '/api/market/listings');
            const listings = await res.json();
            let grouped = { 'خضار': [], 'فواكه': [], 'حيواني': [], 'مصنع': [], 'أخرى': [] };
            for (let l of listings) {
                let cat = 'أخرى';
                if (['Wheat','Tomato','Carrot','Potato','Pepper','Corn'].includes(l.item_name)) cat = 'خضار';
                else if (['Strawberry','Watermelon'].includes(l.item_name)) cat = 'فواكه';
                else if (['Egg','Milk','Wool'].includes(l.item_name)) cat = 'حيواني';
                else if (['Flour','Oil','Bread','Juice'].includes(l.item_name)) cat = 'مصنع';
                grouped[cat].push(l);
            }
            let marketHtml = '';
            for (let [cat, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                marketHtml += `<div class="category-section"><div class="category-title">📂 ${cat}</div>`;
                for (let l of items) marketHtml += `<div class="listing-card"><span>📦 ${l.item_name} x${l.quantity}</span><span>💰 ${formatMoney(l.price_per_unit)}</span><span>👤 ${l.seller_name}</span><button onclick="window.buyListing(${l.id}, ${l.price_per_unit}, ${l.quantity}, '${l.item_name}', ${l.seller_id})">🛒 شراء</button></div>`;
                marketHtml += `</div>`;
            }
            if (marketHtml === '') marketHtml = '<div class="empty-market">🛒 لا توجد إعلانات. كن أول من ينشر!</div>';
            let itemOptions = '<option value="">-- اختر منتج --</option>';
            for (let [item, qty] of Object.entries(player.inventory)) if (qty > 0) itemOptions += `<option value="${item}">${item} (${qty})</option>`;
            document.getElementById('app').innerHTML = `<div class="market-container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${localStorage.getItem('username')}</div><div class="nav-buttons"><a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a><a href="store.html" class="nav-btn">🏪 المتجر</a><a href="delivery.html" class="nav-btn">🚚 النقل</a><button class="logout-btn" id="logoutBtn">🚪 خروج</button></div></div><div class="content"><h2>🛒 السوق المشترك</h2>${marketHtml}<div class="create-listing"><h3>➕ نشر إعلان جديد</h3><select id="itemSelect">${itemOptions}</select><input type="number" id="qtyInput" placeholder="الكمية" min="1"><input type="number" id="priceInput" placeholder="السعر لكل وحدة (فلس)" min="1"><button id="publishBtn">📢 نشر للبيع</button></div><div id="message" class="message"></div></div></div>`;
            document.getElementById('publishBtn').onclick = () => { const item = document.getElementById('itemSelect').value, qty = parseInt(document.getElementById('qtyInput').value), price = parseInt(document.getElementById('priceInput').value); if (!item || !qty || !price) { showMessage('املأ جميع الحقول', true); return; } createListing(item, qty, price); };
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); localStorage.removeItem('username'); window.location.href = 'index.html'; };
        }
        loadPlayer();
        window.buyListing = buyListing;
    </script>
</body>
</html>
