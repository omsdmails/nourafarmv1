<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المطعم - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .restaurant-container { max-width: 650px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .recipe-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .recipe-card button { background: #ffcf4a; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .recipe-card button:disabled { background: #6d6d6d; cursor: not-allowed; opacity: 0.6; }
        .ingredients { font-size: 13px; color: #c5e0b4; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 5px; }
        .ingredient-badge { background: #3b5e2b; border-radius: 30px; padding: 4px 10px; display: inline-flex; align-items: center; gap: 8px; }
        .buy-from-market { background: #8b5a2b; color: white; padding: 2px 8px; border-radius: 30px; font-size: 11px; text-decoration: none; }
        .inventory-list { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-top: 20px; }
        .inventory-item { background: #3b5e2b; border-radius: 30px; padding: 5px 12px; display: inline-block; margin: 4px; font-size: 13px; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        h2, h3 { margin-bottom: 10px; border-right: 4px solid #ffcf4a; padding-right: 10px; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        function formatMoney(fils) {
            if (fils < 10) return fils + ' فلس';
            if (fils < 1000) return (fils / 10) + ' قرش';
            let dinars = fils / 1000;
            let remainder = fils % 1000;
            if (remainder === 0) return dinars + ' دينار';
            return dinars + ' دينار و ' + (remainder / 10) + ' قرش';
        }
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        const RECIPES = {
            "خبز قمح": { emoji: "🍞", ingredients: { "Wheat": 2 }, sellPrice: 12000, desc: "خبز طازج من القمح" },
            "سلطة طماطم": { emoji: "🥗", ingredients: { "Tomato": 2, "Carrot": 1 }, sellPrice: 18000, desc: "سلطة صحية" },
            "بطاطا مقلية": { emoji: "🍟", ingredients: { "Potato": 3 }, sellPrice: 15000, desc: "بطاطا ذهبية" },
            "عجة البيض": { emoji: "🍳", ingredients: { "Egg": 2 }, sellPrice: 10000, desc: "عجة بيض شهية" },
            "فطيرة الفراولة": { emoji: "🥧", ingredients: { "Wheat": 3, "Strawberry": 2 }, sellPrice: 28000, desc: "فطيرة حلوة" }
        };
        let player = { gold: 0, inventory: {} };
        async function loadData() { try { const data = await fetchWithAuth('/api/user/data'); player.gold = data.gold; player.inventory = data.inventory || {}; renderRestaurant(); } catch(e) {} }
        async function cook(recipeName) {
            const recipe = RECIPES[recipeName];
            for (let [ing, qty] of Object.entries(recipe.ingredients)) if ((player.inventory[ing] || 0) < qty) { showMessage(`⚠️ نقص: ${ing}`, true); return; }
            try {
                const data = await fetchWithAuth('/api/restaurant/cook', { method: 'POST', body: JSON.stringify({ recipeName }) });
                if (data.error) showMessage(data.error, true);
                else { showMessage(`🍳 تم طهي ${recipe.emoji} ${recipeName}! +${formatMoney(recipe.sellPrice)}`); loadData(); }
            } catch(e) { showMessage(e.message, true); }
        }
        function buyFromMarket(ingredient) { window.location.href = 'market.html'; }
        function showMessage(msg, isError) { const msgDiv = document.getElementById('message'); msgDiv.innerHTML = msg; msgDiv.className = isError ? 'message error-message' : 'message'; msgDiv.style.display = 'block'; setTimeout(() => { msgDiv.style.display = 'none'; }, 3000); }
        function renderRestaurant() {
            let inventoryHtml = ''; for (let [item, qty] of Object.entries(player.inventory)) if (qty > 0) inventoryHtml += `<span class="inventory-item">📦 ${item}: ${qty}</span>`;
            let recipesHtml = '';
            for (let [name, recipe] of Object.entries(RECIPES)) {
                let ingredientsHtml = ''; let canCook = true;
                for (let [ing, qty] of Object.entries(recipe.ingredients)) {
                    const available = player.inventory[ing] || 0;
                    if (available < qty) canCook = false;
                    ingredientsHtml += `<div class="ingredient-badge">${ing} (${available}/${qty})${!canCook ? ` <a class="buy-from-market" href="#" onclick="event.preventDefault(); window.buyFromMarket('${ing}');">🛒 شراء</a>` : ''}</div>`;
                }
                recipesHtml += `<div class="recipe-card"><div><strong>${recipe.emoji} ${name}</strong> - 💰 ${formatMoney(recipe.sellPrice)}<div class="ingredients">${ingredientsHtml}</div><div style="font-size:11px;">${recipe.desc}</div></div><button onclick="window.cook('${name}')" ${!canCook ? 'disabled' : ''}>🍳 طهي</button></div>`;
            }
            document.getElementById('app').innerHTML = `<div class="restaurant-container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>⭐ 0</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🍽️ المطعم</h2>${recipesHtml}<hr><div class="inventory-list"><h3>📦 مخزونك الحالي</h3>${inventoryHtml}</div><div id="message" class="message"></div></div></div>`;
            document.getElementById('dashboardBtn').onclick = () => { window.location.href = 'dashboard.html'; };
        }
        loadData();
        window.cook = cook; window.buyFromMarket = buyFromMarket;
    </script>
</body>
</html>
