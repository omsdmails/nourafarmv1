<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المنزل الآمن - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .house-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .room-card, .furniture-card, .skill-card { background: #2c5e2a; border-radius: 20px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .progress-bar { background: #4f7840; height: 6px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        const API_BASE = 'https://farm-game-server.onrender.com';
        function formatMoney(fils) {
            if (fils < 10) return fils + ' فلس';
            if (fils < 1000) return (fils / 10) + ' قرش';
            let dinars = fils / 1000;
            let remainder = fils % 1000;
            if (remainder === 0) return dinars + ' دينار';
            return dinars + ' دينار و ' + (remainder / 10) + ' قرش';
        }
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'index.html'; throw new Error('No token'); }
            options.headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(API_BASE + url, options);
            if (res.status === 401 || res.status === 403) { localStorage.removeItem('token'); window.location.href = 'index.html'; throw new Error('Session expired'); }
            return res.json();
        }
        const ROOMS = { 'kitchen':{ name:'مطبخ', emoji:'🍳', price:50000 }, 'library':{ name:'مكتبة', emoji:'📚', price:30000 }, 'garden':{ name:'حديقة', emoji:'🌻', price:40000 }, 'workshop':{ name:'ورشة عمل', emoji:'🔨', price:60000 } };
        const FURNITURE = { 'bed':{ name:'سرير', emoji:'🛏️', price:15000 }, 'table':{ name:'طاولة', emoji:'🪑', price:8000 }, 'lamp':{ name:'لمبة', emoji:'💡', price:5000 } };
        let player = { gold: 0 }; let house = { rooms: ['living_room'], furniture: [] };
        async function loadData() { try { const data = await fetchWithAuth('/api/user/data'); player.gold = data.gold; const houseData = await fetchWithAuth('/api/house/data'); if(houseData) { house = houseData; } renderHome(); } catch(e) {} }
        async function buyRoom(roomId) { const room=ROOMS[roomId]; if(player.gold<room.price){ showMessage(`⚠️ تحتاج ${formatMoney(room.price)}`,true); return; } try { const data=await fetchWithAuth('/api/house/buy-room',{ method:'POST', body:JSON.stringify({ roomId, price:room.price }) }); if(data.error) showMessage(data.error,true); else { player.gold=data.gold; house=data.house; renderHome(); showMessage(`✅ اشتريت ${room.emoji} ${room.name}!`); } } catch(e){ showMessage(e.message,true); } }
        async function buyFurniture(furnitureId) { const furn=FURNITURE[furnitureId]; if(player.gold<furn.price){ showMessage(`⚠️ تحتاج ${formatMoney(furn.price)}`,true); return; } try { const data=await fetchWithAuth('/api/house/buy-furniture',{ method:'POST', body:JSON.stringify({ furnitureId, price:furn.price }) }); if(data.error) showMessage(data.error,true); else { player.gold=data.gold; house=data.house; renderHome(); showMessage(`✅ اشتريت ${furn.emoji} ${furn.name}!`); } } catch(e){ showMessage(e.message,true); } }
        function showMessage(msg, isError) { const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        function renderHome() {
            let roomsHtml=''; for(let [id,room] of Object.entries(ROOMS)){ const owned=house.rooms.includes(id); roomsHtml+=`<div class="room-card"><div><strong>${room.emoji} ${room.name}</strong><br>💰 ${formatMoney(room.price)}</div>${!owned?`<button onclick="window.buyRoom('${id}')">شراء</button>`:'<span>✅ مملوكة</span>'}</div>`; }
            let furnitureHtml=''; for(let [id,furn] of Object.entries(FURNITURE)){ const owned=house.furniture.includes(id); furnitureHtml+=`<div class="furniture-card"><div>${furn.emoji} ${furn.name} - 💰 ${formatMoney(furn.price)}</div>${!owned?`<button onclick="window.buyFurniture('${id}')">شراء</button>`:'<span>✅ مملوك</span>'}</div>`; }
            document.getElementById('app').innerHTML = `<div class="container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${localStorage.getItem('username')}</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🏡 منزلي الآمن</h2><div class="house-card"><h3>🚪 الغرف</h3>${roomsHtml}<hr><h3>🪑 الأثاث</h3>${furnitureHtml}</div><div id="message" class="message"></div></div></div>`;
            document.getElementById('dashboardBtn').onclick = () => { window.location.href = 'dashboard.html'; };
        }
        loadData();
        window.buyRoom = buyRoom; window.buyFurniture = buyFurniture;
    </script>
</body>
</html>
